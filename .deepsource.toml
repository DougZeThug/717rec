version = 1

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  plugins = ["react"]
  environment = ["browser"]
  dialect = "typescript"

[[analyzers]]
name = "test-coverage"
enabled = true

exclude_patterns = [
  "node_modules/**",
  "dist/**",
  "coverage/**",
  "*.config.js",
  "src/integrations/supabase/types.ts"
]
