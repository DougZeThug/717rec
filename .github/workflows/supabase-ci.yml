name: Supabase CI

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase-ci.yml'
  pull_request:
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase-ci.yml'
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

concurrency:
  group: supabase-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  db-lint:
    name: supabase db lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Supabase CLI
        id: cache-supabase-cli
        uses: actions/cache@v4
        with:
          path: ~/.supabase-cli
          key: supabase-cli-${{ runner.os }}-latest-v1
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Lint migrations
        run: |
          # `supabase db lint` requires a running DB; use `--linked`-free local run.
          # We run it against the migrations directory via a temporary local DB.
          supabase init --force --workdir . >/dev/null || true
          # Best-effort lint. Surfaces warnings/errors from migration SQL.
          supabase db lint --level warning --schema public || {
            echo "::warning::supabase db lint reported issues (see log)";
            exit 1;
          }

  db-apply-and-smoke:
    name: Apply migrations + SQL smoke tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: localhost
      PGPORT: '5432'
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v4
      # psql is preinstalled on ubuntu-latest runners; no apt install needed.
      - name: Apply bootstrap + all migrations (single psql invocation)
        run: |
          set -euo pipefail
          combined=$(mktemp)
          {
            echo "\\echo '== bootstrap =='"
            cat supabase/tests/_bootstrap.sql
            for f in $(ls supabase/migrations/*.sql | sort); do
              echo "\\echo '== migration: $f =='"
              cat "$f"
            done
          } > "$combined"
          psql -v ON_ERROR_STOP=1 -f "$combined"
      - name: Run SQL smoke tests (single psql invocation)
        run: |
          set -euo pipefail
          shopt -s nullglob
          combined=$(mktemp)
          ran=0
          for f in supabase/tests/*.sql; do
            base=$(basename "$f")
            [[ "$base" == _*.sql ]] && continue
            echo "\\echo '== smoke: $f =='" >> "$combined"
            cat "$f" >> "$combined"
            echo "" >> "$combined"
            ran=$((ran + 1))
          done
          if [ "$ran" -gt 0 ]; then
            psql -v ON_ERROR_STOP=1 -f "$combined"
          fi
          echo "Ran $ran smoke test(s)."

  edge-function-tests:
    name: Edge function Deno tests
    runs-on: ubuntu-latest
    env:
      # Safe placeholders so dotenv-style test loaders don't crash.
      # Tests that need real network must guard themselves.
      VITE_SUPABASE_URL: https://placeholder.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: placeholder-anon-key
      SUPABASE_CI: '1'
      DENO_DIR: ~/.cache/deno
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ runner.os }}-${{ hashFiles('supabase/functions/**/*.ts') }}
          restore-keys: |
            deno-${{ runner.os }}-
      - name: Run Deno tests
        run: |
          if compgen -G "supabase/functions/**/*_test.ts" > /dev/null || \
             compgen -G "supabase/functions/**/*.test.ts" > /dev/null; then
            deno test \
              --allow-net --allow-env --allow-read \
              --no-check \
              supabase/functions/
          else
            echo "No edge function tests found; skipping."
          fi