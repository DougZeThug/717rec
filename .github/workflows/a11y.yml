# Required gate: axe WCAG 2 A/AA scan against key public routes.
# To silence a specific rule, add its id to DISABLED_RULES in e2e/a11y.spec.ts
# with a comment explaining why — do not re-add continue-on-error here.
name: A11y (axe)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  a11y:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm run e2e:install

      - name: Run axe a11y scan
        run: npx playwright test e2e/a11y.spec.ts
        env:
          CI: 'true'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-playwright-report
          path: playwright-report
          retention-days: 7