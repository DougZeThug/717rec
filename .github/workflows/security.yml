name: Security

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '.gitleaks.toml'
      - '.github/audit-allowlist.json'
      - '.github/workflows/security.yml'
      - '.env*'
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '.gitleaks.toml'
      - '.github/audit-allowlist.json'
      - '.github/workflows/security.yml'
      - '.env*'
  schedule:
    # Weekly full security sweep, Monday 01:00 UTC.
    - cron: '0 1 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit (prod deps, high+)
        run: |
          set -o pipefail
          npm audit --json --omit=dev > audit-report.json || true

          echo "## Security Audit Report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npm audit --omit=dev 2>&1 | head -100 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          node <<'EOF_NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('audit-report.json', 'utf8'));
          const allowlist = JSON.parse(fs.readFileSync('.github/audit-allowlist.json', 'utf8'));
          const allowedIds = new Set((allowlist.advisories || []).map(a => String(a.id)));

          const today = new Date().toISOString().slice(0, 10);
          for (const a of allowlist.advisories || []) {
            if (a.expires && a.expires < today) {
              console.log(`::warning::Audit allowlist entry ${a.id} (${a.package}) expired on ${a.expires}. Remove or re-justify.`);
            }
          }

          const vulns = report.vulnerabilities || {};
          const offenders = [];
          for (const [pkg, info] of Object.entries(vulns)) {
            if (!['high', 'critical'].includes(info.severity)) continue;
            const viaIds = (info.via || [])
              .filter(v => typeof v === 'object' && (v.source || v.url))
              .map(v => String(v.source ?? (v.url || '').split('/').pop()));
            const allAllowed = viaIds.length > 0 && viaIds.every(id => allowedIds.has(id));
            if (allAllowed) {
              console.log(`::notice::Allowlisted ${info.severity} advisory for ${pkg} (via ${viaIds.join(', ')})`);
              continue;
            }
            offenders.push({ pkg, severity: info.severity, viaIds });
          }

          if (offenders.length > 0) {
            console.log('::error::High/critical production advisories detected:');
            for (const o of offenders) {
              console.log(`  - ${o.pkg} [${o.severity}] via ${o.viaIds.join(', ') || '(unknown)'}`);
            }
            process.exit(1);
          }
          console.log('OK — no unallowlisted high/critical production advisories.');
          EOF_NODE

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.json
          retention-days: 14

  committed-env-files:
    name: No committed local env files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fail if local env files are tracked
        run: |
          offenders=$(git ls-files \
            | grep -E '(^|/)\.env\.(local|development|production|test)(\.[A-Za-z0-9_.-]+)?$' \
            | grep -vE '(^|/)\.env\.example$' || true)
          if [ -n "$offenders" ]; then
            echo "::error::Local environment files must not be committed. See docs/SECRETS.md."
            echo "Offending files:"
            echo "$offenders"
            exit 1
          fi
          echo "OK — no local .env files are tracked."

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
