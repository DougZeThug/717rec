  <!-- Icicle 7 -->
  <path d="M478,12 Q480,12 481,13 L481,32 Q480.5,36 480,32 L479,13 Q479,12 478,12 Z" fill="url(#icicleGradLight)"/>
  <path d="M479.5,13 L479.5,30" stroke="#FFFFFF" stroke-width="0.8" stroke-opacity="0.3"/>
  
  <!-- Icicle 8 -->
  <path d="M558,10 Q560,10 561,11 L561,24 Q560.5,28 560,24 L559,11 Q559,10 558,10 Z" fill="url(#icicleGradLight)"/>
