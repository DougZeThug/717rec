  <!-- Icicle 3 -->
  <path d="M158,12 Q160,12 161,13 L161,34 Q160.5,38 160,34 L159,13 Q159,12 158,12 Z" fill="url(#icicleGradLight)"/>
  <path d="M159.5,13 L159.5,32" stroke="#FFFFFF" stroke-width="0.8" stroke-opacity="0.3"/>
  
