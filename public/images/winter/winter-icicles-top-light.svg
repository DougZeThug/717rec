  <!-- Icicle 9 -->
  <path d="M638,12 Q640,12 641,13 L641,28 Q640.5,32 640,28 L639,13 Q639,12 638,12 Z" fill="url(#icicleGradLight)"/>
  <path d="M639.5,13 L639.5,26" stroke="#FFFFFF" stroke-width="0.8" stroke-opacity="0.3"/>
  
  <!-- Icicle 10 -->
  <path d="M718,10 Q720,10 721,11 L721,18 Q720.5,21 720,18 L719,11 Q719,10 718,10 Z" fill="url(#icicleGradLight)"/>
  <path d="M719.5,11 L719.5,16" stroke="#FFFFFF" stroke-width="0.8" stroke-opacity="0.3"/>
  
  <!-- Icicle 11 -->
  <path d="M758,11 Q760,11 761,12 L761,26 Q760.5,30 760,26 L759,12 Q759,11 758,11 Z" fill="url(#icicleGradLight)"/>
  <path d="M759.5,12 L759.5,24" stroke="#FFFFFF" stroke-width="0.8" stroke-opacity="0.3"/>
</svg>
