<svg xmlns="http://www.w3.org/2000/svg" width="800" height="40" viewBox="0 0 800 40">
  <defs>
    <!-- Icicle gradient -->
    <linearGradient id="icicleGradLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BFE3FF"/>
      <stop offset="35%" stop-color="#D9F0FF"/>
      <stop offset="65%" stop-color="#D9F0FF"/>
      <stop offset="100%" stop-color="#BFE3FF"/>
    </linearGradient>
    <!-- Snow shadow gradient -->
    <linearGradient id="snowShadowLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="70%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E9F3FF"/>
    </linearGradient>
  </defs>
  
  <!-- Snow cap base with gentle bumps - seamless tile -->
  <path d="M0,0 L0,10 
           Q20,12 40,11 Q60,13 80,10 Q100,8 120,11 Q140,14 160,12 
           Q180,10 200,11 Q220,13 240,10 Q260,8 280,11 Q300,14 320,12
           Q340,10 360,11 Q380,13 400,10 Q420,8 440,11 Q460,14 480,12
           Q500,10 520,11 Q540,13 560,10 Q580,8 600,11 Q620,14 640,12
           Q660,10 680,11 Q700,13 720,10 Q740,8 760,11 Q780,14 800,10
           L800,0 Z" 
        fill="url(#snowShadowLight)"/>
  
  <!-- Snow highlight edge -->
  <path d="M0,0 L0,8 
           Q20,10 40,9 Q60,11 80,8 Q100,6 120,9 Q140,12 160,10 
           Q180,8 200,9 Q220,11 240,8 Q260,6 280,9 Q300,12 320,10
           Q340,8 360,9 Q380,11 400,8 Q420,6 440,9 Q460,12 480,10
           Q500,8 520,9 Q540,11 560,8 Q580,6 600,9 Q620,12 640,10
           Q660,8 680,9 Q700,11 720,8 Q740,6 760,9 Q780,12 800,8
           L800,0 Z" 
        fill="#F7FBFF"/>
  
  <!-- Subtle separator line -->
  <path d="M0,10 
           Q20,12 40,11 Q60,13 80,10 Q100,8 120,11 Q140,14 160,12 
           Q180,10 200,11 Q220,13 240,10 Q260,8 280,11 Q300,14 320,12
           Q340,10 360,11 Q380,13 400,10 Q420,8 440,11 Q460,14 480,12
           Q500,10 520,11 Q540,13 560,10 Q580,8 600,11 Q620,14 640,12
           Q660,10 680,11 Q700,13 720,10 Q740,8 760,11 Q780,14 800,10" 
        fill="none" stroke="#CFE7FF" stroke-width="0.5" stroke-opacity="0.4"/>
  
  <!-- Icicles - varied lengths, smooth tapered shapes -->
  <!-- Icicle 1 -->
  <path d="M45,11 Q47,11 48,12 L48,28 Q47.5,32 47,28 L46,12 Q46,11 45,11 Z" fill="url(#icicleGradLight)"/>
  <path d="M46.5,12 L46.5,26" stroke="#FFFFFF" stroke-width="0.8" stroke-opacity="0.3"/>
  
  <!-- Icicle 2 -->
  <path d="M118,10 Q120,10 121,11 L121,22 Q120.5,25 120,22 L119,11 Q119,10 118,10 Z" fill="url(#icicleGradLight)"/>
